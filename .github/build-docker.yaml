name: Build and Publish image to Docker Hub

on:
    [workflow_dispatch]

jobs:
    publish_images:
        runs-on: ubuntu-latest

        steps:
          - name: checkout
            uses: actions/checkout@v4
          - name: build image
            run: docker build .  -t hammadiioumaima/devop_node.js:1.0
          - name: push image to docker Hub
            run: |
              docker push hammadiioumaima/devop_node.js:1.0

     

    